<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizReply</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
      color: #111;
    }

    header {
      background: linear-gradient(135deg, #1e7d3e, #145a2c);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    header h2 {
      margin: 0;
      font-size: 22px;
    }

    .container {
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    button {
      padding: 12px;
      margin-top: 10px;
      background: #1e7d3e;
      color: white;
      border: none;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #145a2c;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f5f7fa;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #e4e8ef;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .badge {
      background: gold;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: black;
      font-weight: bold;
    }

    .upgrade {
      background: #000;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="card">
    <h3>Login / Signup 🔐</h3>

    <input id="email" placeholder="Email"
      style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;">

    <!-- FIX: must match JS function name -->
    <button onclick="signUp()">Create Account</button>
    <button onclick="loginUser()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <h2>BizReply</h2>

  <span class="badge" id="proStatus">FREE</span>

  <!-- 🔥 ADD LOGOUT -->
  <button onclick="logout()" 
  style="margin-top:10px;background:red;border:none;border-radius:10px;padding:10px;color:white;width:100%;font-weight:bold;cursor:pointer;">
  Logout
</button>
</header>

<div class="container">

  <div class="card">
    <h3>Dashboard</h3>
    <p id="stats" class="small"></p>
  </div>

  <div class="card">
    <h3>Admin Analytics 📊</h3>
    <p class="small" id="adminStats"></p>
  </div>

  <div class="card">
    <h3>Quick Replies</h3>
    <button onclick="addReply()">+ Add Reply</button>
    <ul id="replyList"></ul>
  </div>

  <div class="card">
    <h3>Customers</h3>
    <button onclick="addCustomer()">+ Add Customer</button>
    <ul id="customerList"></ul>
  </div>

  <div class="card">
    <h3>Grow BizReply</h3>
    <button onclick="inviteFriend()">Invite Friends 🔗</button>
    <p class="small">Invite 5 friends to unlock Pro free</p>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
